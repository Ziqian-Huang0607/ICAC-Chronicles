<!DOCTYPE html>
<html lang="zh-HK">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#0a0a0f">
<meta name="description" content="ICAC Chronicles - Hong Kong Anti-Corruption Strategy Game">
<title>ICAC Chronicles | 廉政行动</title>
<link rel="manifest" href="manifest.json">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{width:100%;height:100%;overflow:hidden;background:#0a0a0f;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Hiragino Sans GB","Microsoft YaHei",sans-serif;touch-action:none}
#game-container{width:100%;height:100%;position:relative}
#game-container canvas{display:block;width:100%!important;height:100%!important}
#loading{position:fixed;top:0;left:0;width:100%;height:100%;background:#0a0a0f;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:9999;transition:opacity .6s}
#loading.hidden{opacity:0;pointer-events:none}
#loading h1{color:#c9a84c;font-size:clamp(28px,5vw,52px);letter-spacing:.15em;font-family:Georgia,serif;text-shadow:0 0 30px rgba(201,168,76,.3)}
#loading .subtitle{color:#666;font-size:clamp(13px,2vw,18px);margin:8px 0 30px;letter-spacing:.3em}
#loading .spinner{width:36px;height:36px;border:2px solid #1a1a2e;border-top-color:#c9a84c;border-radius:50%;animation:spin .8s linear infinite}
#loading .bar{width:180px;height:3px;background:#1a1a2e;margin-top:24px;border-radius:1px;overflow:hidden}
#loading .fill{height:100%;background:linear-gradient(90deg,#c9a84c,#d4b85c);width:0%;transition:width .3s}
#loading .status{color:#555;font-size:11px;margin-top:8px;font-family:monospace}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>
<div id="loading">
  <h1>ICAC CHRONICLES</h1>
  <p class="subtitle">廉政行动 &mdash; 策略叙事游戏</p>
  <div class="spinner"></div>
  <div class="bar"><div class="fill" id="pfill"></div></div>
  <p class="status" id="ptext">INITIALIZING...</p>
</div>
<div id="game-container"></div>

<script>var ICAC = { config: { w: 1280, h: 720, colors: { bg: '#0a0a0f', surface: '#12121f', panel: '#0d0d18', gold: '#c9a84c', goldDim: '#8b7355', text: '#e0ded8', muted: '#777', danger: '#b44', success: '#4a6', info: '#48a', warning: '#ca4', corrupt: '#7a3344', icac: '#2a5a4a', water: '#0d1b2a', road: '#222233' } } };</script>
<script src="phaser.min.js"></script>

<script src="src/data/ranks.js"></script>
<script src="src/data/districts.js"></script>
<script src="src/data/sunzi.js"></script>
<script src="src/data/leaders.js"></script>
<script src="src/data/missions.js"></script>

<script src="src/systems/SaveSystem.js"></script>
<script src="src/systems/AuthSystem.js"></script>
<script src="src/systems/CoverSystem.js"></script>
<script src="src/systems/ReputationSystem.js"></script>
<script src="src/systems/NetworkSystem.js"></script>
<script src="src/systems/AudioSystem.js"></script>
<script src="src/systems/UIToolkit.js"></script>

<script src="src/scenes/BootScene.js"></script>
<script src="src/scenes/PreloadScene.js"></script>
<script src="src/scenes/MenuScene.js"></script>
<script src="src/scenes/GameScene.js"></script>
<script src="src/scenes/MissionScene.js"></script>
<script src="src/scenes/DebriefScene.js"></script>
<script src="src/scenes/SettingsScene.js"></script>

<script src="src/main.js"></script>
<script>if('serviceWorker'in navigator)navigator.serviceWorker.register('sw.js').catch(function(){});</script>
</body>
</html>
